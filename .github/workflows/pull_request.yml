name: Code quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: bun i
      - name: Typecheck
        run: bun run typecheck
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.1.3
      - name: Run Biome
        run: biome ci .